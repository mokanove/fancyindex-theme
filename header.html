<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>FileList | MoKanove</title>
    <link rel="stylesheet" href="/fancyindex-theme/style.css" />
    <link
      rel="shortcut icon"
      href="https://867678.xyz/favicon.svg"
      type="image/x-icon"
    />
  </head>
  <body class="theme-light">
    <h1>Index of</h1>

    <nav class="breadcrumb-nav" aria-label="Breadcrumb">
      <ol class="breadcrumb">
        <li><a href="/">Root</a></li>
      </ol>
      <button
        class="copy-page-url-btn"
        type="button"
        aria-label="Copy current page URL"
      >
        Copy URL
      </button>
    </nav>

    <div class="directory-controls">
      <button type="button" class="theme-toggle" aria-label="Change theme">
        Auto
      </button>
      <form>
        <input
          name="filter"
          id="search"
          type="search"
          placeholder="Type to search..."
          aria-label="Search directory"
        />
      </form>
    </div>
  </body>
</html>
